<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bira? 🍻🍻🍻</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f3e5ab;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext x='10' y='30' font-size='20'%3E🍺%3C/text%3E%3C/svg%3E");
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 35px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            max-width: 450px;
            width: 85%;
            display: flex;
            flex-direction: column;
            align-items: center;
            backdrop-filter: blur(5px);
        }
        img {
            width: 100%;
            max-width: 260px;
            height: 220px;
            object-fit: contain;
            border-radius: 20px;
            margin-bottom: 25px;
        }
        h1 {
            font-size: 24px;
            color: #002d72;
            min-height: 80px;
            margin: 10px 0;
            line-height: 1.3;
        }
        .buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            width: 100%;
            margin-top: 10px;
            min-height: 100px;
        }
        button {
            padding: 14px 28px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        #yesBtn {
            background-color: #fedd00;
            color: #002d72;
            z-index: 100;
        }
        #noBtn {
            background-color: #002d72;
            color: white;
        }
    </style>
</head>
<body>

<div class="container">
    <h1 id="question">Birkaç bira içip biraz kafa mı dağıtsak? 🍻🍻🍻</h1>
    <img id="anaGorsel" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJtYm96Znd4ZzR6bm96bm96bm96bm96bm96JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/h8NdYZJGH1ZRe/giphy.gif">
    
    <div class="buttons">
        <button id="yesBtn" onclick="evet()">Evet!</button>
        <button id="noBtn" onclick="hayirBasildi()">Hayır</button>
    </div>
</div>

<script>
    let hamle = 0;
    let butonBoyutu = 1;
    let onaylandi = false; // Instagram yönlendirmesi için kontrol

    function evet() {
        if (!onaylandi) {
            // İlk tıklamada her şeyi değiştir
            document.getElementById('question').innerHTML = "Harika karar! O zaman haberleşiyoruz, biralar benden 🍺✨";
            document.getElementById('anaGorsel').src = "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJtYm96Znd4ZzR6bm96bm96bm96bm96bm96JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/E3L5goMMSoAAo/giphy.gif";
            document.getElementById('noBtn').style.display = 'none';
            document.getElementById('yesBtn').style.transform = "scale(1.1)";
            document.getElementById('yesBtn').innerHTML = "Bana Instagram'dan yaz! 👋";
            onaylandi = true;
        } else {
            // İkinci tıklamada Instagram'ı aç
            // BURAYA KENDİ KULLANICI ADINI YAZ (Örn: erenokutan)
            const instagramKullaniciAdi = "eren_okutan"; 
            window.location.href = "https://ig.me/m/" + instagramKullaniciAdi;
        }
    }

    function hayirBasildi() {
        hamle++;
        const evetButon = document.getElementById('yesBtn');
        const baslik = document.getElementById('question');
        const resim = document.getElementById('anaGorsel');

        butonBoyutu += 0.6; 
        evetButon.style.transform = "scale(" + butonBoyutu + ")";

        if (hamle === 1) {
            baslik.innerHTML = "Sadece birkaç bira ?????";
            resim.src = "number1.gif";
        } 
        else if (hamle === 2) {
            baslik.innerHTML = "Çok eğlenceli olur bence  ???????";
            resim.src = "number2.gif";
        }
        else if (hamle >= 3) {
            document.getElementById('noBtn').style.display = 'none';
            baslik.innerHTML = "Bence bu bir işaret, Hadi gel içelim!";
            resim.src = "https://media0.giphy.com/media/v1.Y2lkPTc5MGI3NjExb2Y5eWdtMXN1MjN6ZW5hcmVvbTNrZXNxYzNoZDg5dGJkNHBvaGZxayZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/Ztw0p2RGR36E0/giphy.gif";
            evetButon.style.transform = "scale(" + (butonBoyutu + 0.3) + ")";
        }
    }
</script>

</body>
</html>
